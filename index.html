<script>
function downloadTemplate() {
  const csvContent = "SKU,Description,CurrentStock,MonthlyDemand,LeadTimeDays\nA,Item A,100,300,10\nB,Item B,50,200,15";
  const blob = new Blob([csvContent], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "reorderreport-template.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  window.URL.revokeObjectURL(url);
}

function handleUpload() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    document.getElementById("status").innerHTML = "<p>Please upload a CSV file.</p>";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result.trim();
    const rows = text.split("\n").map(r => r.split(","));

    if (rows.length < 2) {
      document.getElementById("status").innerHTML = "<p>CSV is empty.</p>";
      return;
    }

    const headers = rows[0].map(h => h.trim());
    const data = rows.slice(1);

    // Detect columns
    const hasHistory = headers.includes("M1");

    let urgentCount = 0;
    let lowCount = 0;
    let nextStockout = Infinity;
    let totalOrder = 0;

    let output = "<h3>Summary</h3><div style='margin-bottom:15px;'>";

    let table = "<div class='table-wrap'><table><tr>";

    headers.forEach(h => table += `<th>${h}</th>`);
    table += "<th>Forecast</th><th>Safety Stock</th><th>Days to Stockout</th><th>Reorder Qty</th><th>Status</th><th>Reason</th></tr>";

    data.forEach(row => {
      if (row.length < 4) return;

      let stock = parseFloat(row[headers.indexOf("CurrentStock")]);
      let lead = parseFloat(row[headers.indexOf("LeadTimeDays")]);

      if (isNaN(stock) || isNaN(lead)) return;

      // ===== FORECAST =====
      let forecast;

      if (hasHistory) {
        let m1 = parseFloat(row[headers.indexOf("M1")]) || 0;
        let m2 = parseFloat(row[headers.indexOf("M2")]) || 0;
        let m3 = parseFloat(row[headers.indexOf("M3")]) || 0;

        forecast = (m1 + m2 + m3) / 3;
      } else {
        forecast = parseFloat(row[headers.indexOf("MonthlyDemand")]);
      }

      if (!forecast || forecast <= 0) return;

      let daily = forecast / 30;

      // ===== SAFETY STOCK =====
      let safetyDays = 7;
      let safetyStock = daily * safetyDays;

      // ===== REORDER =====
      let reorderPoint = (daily * lead) + safetyStock;
      let reorderQty = Math.max(0, reorderPoint - stock);

      // ===== STOCKOUT =====
      let daysToStockout = stock / daily;

      // ===== STATUS =====
      let status = "OK";

      if (daysToStockout < lead) {
        status = "URGENT";
        urgentCount++;
      } else if (daysToStockout < lead + safetyDays) {
        status = "LOW";
        lowCount++;
      }

      if (daysToStockout < nextStockout) nextStockout = daysToStockout;
      totalOrder += Math.ceil(reorderQty);

      // ===== EXPLANATION =====
      let reason = `Stockout in ${daysToStockout.toFixed(1)} days. Lead time ${lead} days. Safety buffer ${safetyDays} days.`;

      // ===== COLOUR =====
      let color = "white";
      if (status === "URGENT") color = "#ef4444";
      if (status === "LOW") color = "#f59e0b";
      if (status === "OK") color = "#22c55e";

      table += "<tr>";

      row.forEach(cell => table += `<td>${cell}</td>`);

      table += `
        <td>${forecast.toFixed(0)}</td>
        <td>${Math.ceil(safetyStock)}</td>
        <td>${daysToStockout.toFixed(1)}</td>
        <td>${Math.ceil(reorderQty)}</td>
        <td style="color:${color}; font-weight:bold;">${status}</td>
        <td style="text-align:left;">${reason}</td>
      </tr>`;
    });

    table += "</table></div>";

    output += `
      Urgent: ${urgentCount} | 
      Low: ${lowCount} | 
      Next stockout: ${nextStockout.toFixed(1)} days | 
      Suggested order qty: ${totalOrder}
    </div>`;

    document.getElementById("status").innerHTML = output + table;
  };

  reader.readAsText(file);
}
</script>
